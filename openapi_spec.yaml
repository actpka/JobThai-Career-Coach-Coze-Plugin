yaml 
openapi: 3.0.3
info:
  title: JobThai Plugin
  version: 1.0.0
servers:
  - url: https://jobthai-career-coach-coze-plugin.onrender.com
paths:
  /search-jobs:
    get:
      operationId: searchJobs
      summary: ค้นหางานจาก JobThai
      parameters:
        - name: keyword
          in: query
          required: true
          description: คำค้นหา เช่น Python
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: จำนวนผลลัพธ์
          schema:
            type: integer
      responses:
        "200":
          description: รายการงาน
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      type: object
